# ============================================================================
# WHATSAPP ASSISTANT API - DOCKER COMPOSE
# ============================================================================

version: '3.8'

services:
  # ==========================================================================
  # APPLICATION
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-assistant
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=wa_assistant
      - JWT_SECRET=${JWT_SECRET}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads
    networks:
      - wa-assistant-network

  # ==========================================================================
  # DATABASE
  # ==========================================================================
  db:
    image: mysql:8.0
    container_name: wa-assistant-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_DATABASE=wa_assistant
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wa-assistant-network

  # ==========================================================================
  # REDIS (Optional - untuk caching)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: wa-assistant-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - wa-assistant-network

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  mysql_data:
  redis_data:

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  wa-assistant-network:
    driver: bridge
